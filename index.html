<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Smart Tools Hub</title><style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:20px;
}

h1{
color:#333;
}

.container{
max-width:800px;
margin:auto;
}

.tool{
background:white;
padding:20px;
margin:20px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
margin:5px;
width:150px;
}

button{
padding:10px 15px;
margin-top:10px;
cursor:pointer;
}

</style></head><body><h1>Smart Tools Hub</h1><div class="container"><!-- AGE CALCULATOR --><div class="tool">
<h2>Age Calculator</h2>
<input type="date" id="dob">
<br>
<button onclick="ageCalc()">Calculate</button>
<h3 id="ageResult"></h3>
</div><!-- BMI CALCULATOR --><div class="tool">
<h2>BMI Calculator</h2>
<input id="weight" placeholder="Weight (kg)">
<input id="height" placeholder="Height (meters)">
<br>
<button onclick="bmiCalc()">Calculate</button>
<h3 id="bmiResult"></h3>
</div><!-- PERCENTAGE CALCULATOR --><div class="tool">
<h2>Percentage Calculator</h2>
<input id="num" placeholder="Number">
<input id="per" placeholder="Percentage">
<br>
<button onclick="perCalc()">Calculate</button>
<h3 id="perResult"></h3>
</div><!-- DISCOUNT CALCULATOR --><div class="tool">
<h2>Discount Calculator</h2>
<input id="price" placeholder="Original Price">
<input id="discount" placeholder="Discount %">
<br>
<button onclick="discountCalc()">Calculate</button>
<h3 id="discountResult"></h3>
</div><!-- EMI CALCULATOR --><div class="tool">
<h2>EMI Calculator</h2>
<input id="loan" placeholder="Loan Amount">
<input id="rate" placeholder="Interest %">
<input id="months" placeholder="Months">
<br>
<button onclick="emiCalc()">Calculate</button>
<h3 id="emiResult"></h3>
</div><!-- GST CALCULATOR --><div class="tool">
<h2>GST Calculator</h2>
<input id="gstPrice" placeholder="Amount">
<input id="gstRate" placeholder="GST %">
<br>
<button onclick="gstCalc()">Calculate</button>
<h3 id="gstResult"></h3>
</div></div><script>

function ageCalc(){

let dob=document.getElementById("dob").value;

if(!dob){
alert("Select date of birth");
return;
}

let birth=new Date(dob);
let today=new Date();

let age=today.getFullYear()-birth.getFullYear();

document.getElementById("ageResult").innerHTML="Age: "+age+" years";

}

function bmiCalc(){

let w=parseFloat(document.getElementById("weight").value);
let h=parseFloat(document.getElementById("height").value);

if(!w || !h){
alert("Enter weight and height");
return;
}

let bmi=w/(h*h);

document.getElementById("bmiResult").innerHTML="BMI: "+bmi.toFixed(2);

}

function perCalc(){

let n=parseFloat(document.getElementById("num").value);
let p=parseFloat(document.getElementById("per").value);

if(!n || !p){
alert("Enter values");
return;
}

let r=(n*p)/100;

document.getElementById("perResult").innerHTML="Result: "+r;

}

function discountCalc(){

let price=parseFloat(document.getElementById("price").value);
let dis=parseFloat(document.getElementById("discount").value);

if(!price || !dis){
alert("Enter values");
return;
}

let final=price-(price*dis/100);

document.getElementById("discountResult").innerHTML="Final Price: "+final;

}

function emiCalc(){

let p=parseFloat(document.getElementById("loan").value);
let r=parseFloat(document.getElementById("rate").value)/12/100;
let n=parseFloat(document.getElementById("months").value);

if(!p || !r || !n){
alert("Enter values");
return;
}

let emi=(p*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);

document.getElementById("emiResult").innerHTML="Monthly EMI: "+Math.round(emi);

}

function gstCalc(){

let price=parseFloat(document.getElementById("gstPrice").value);
let rate=parseFloat(document.getElementById("gstRate").value);

if(!price || !rate){
alert("Enter values");
return;
}

let gst=price*rate/100;
let total=price+gst;

document.getElementById("gstResult").innerHTML="Total Price: "+total;

}

</script></body>
</html>

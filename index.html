<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Smart Tools Hub</title><style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.tool{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:8px;
margin:5px;
width:120px;
}

button{
padding:8px 12px;
cursor:pointer;
}

</style></head><body><h1>Smart Tools Hub</h1><div class="grid" id="tools"></div><script>

const tools=[

{ name:"Age Calculator",
html:`<input type="date" id="dob">
<button onclick="age()">Calculate</button>
<p id="ageRes"></p>` },

{ name:"BMI Calculator",
html:`<input id="w" placeholder="kg">
<input id="h" placeholder="m">
<button onclick="bmi()">Calc</button>
<p id="bmiRes"></p>` },

{ name:"Percentage Calculator",
html:`<input id="num">
<input id="per">
<button onclick="percent()">Calc</button>
<p id="perRes"></p>` },

{ name:"Discount Calculator",
html:`<input id="price">
<input id="disc">
<button onclick="discount()">Calc</button>
<p id="discRes"></p>` },

{ name:"GST Calculator",
html:`<input id="gstPrice">
<input id="gstRate">
<button onclick="gst()">Calc</button>
<p id="gstRes"></p>` },

{ name:"Square Calculator",
html:`<input id="sq">
<button onclick="square()">Calc</button>
<p id="sqRes"></p>` },

{ name:"Cube Calculator",
html:`<input id="cube">
<button onclick="cube()">Calc</button>
<p id="cubeRes"></p>` },

{ name:"Average Calculator",
html:`<input id="a1"><input id="a2"><input id="a3">
<button onclick="avg()">Calc</button>
<p id="avgRes"></p>` }

];

const container=document.getElementById("tools");

tools.forEach(t=>{
container.innerHTML+=`
<div class="tool">
<h3>${t.name}</h3>
${t.html}
</div>`;
});

function age(){
let dob=new Date(document.getElementById("dob").value);
let age=new Date().getFullYear()-dob.getFullYear();
document.getElementById("ageRes").innerText="Age: "+age;
}

function bmi(){
let w=document.getElementById("w").value;
let h=document.getElementById("h").value;
document.getElementById("bmiRes").innerText="BMI: "+(w/(h*h)).toFixed(2);
}

function percent(){
let n=document.getElementById("num").value;
let p=document.getElementById("per").value;
document.getElementById("perRes").innerText=(n*p)/100;
}

function discount(){
let price=document.getElementById("price").value;
let d=document.getElementById("disc").value;
document.getElementById("discRes").innerText=price-(price*d/100);
}

function gst(){
let p=document.getElementById("gstPrice").value;
let r=document.getElementById("gstRate").value;
document.getElementById("gstRes").innerText=parseFloat(p)+(p*r/100);
}

function square(){
let n=document.getElementById("sq").value;
document.getElementById("sqRes").innerText=n*n;
}

function cube(){
let n=document.getElementById("cube").value;
document.getElementById("cubeRes").innerText=n*n*n;
}

function avg(){
let a=parseFloat(a1.value);
let b=parseFloat(a2.value);
let c=parseFloat(a3.value);
document.getElementById("avgRes").innerText=(a+b+c)/3;
}

</script></body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Smart Tools Hub</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}
.box{
background:white;
padding:20px;
margin:20px auto;
width:300px;
border-radius:10px;
box-shadow:0 0 10px gray;
}
button{
padding:8px 15px;
}
</style>
</head>

<body>

<h1>Smart Tools Hub</h1>

<div class="box">
<h3>Age Calculator</h3>
<input type="date" id="dob">
<br><br>
<button onclick="age()">Calculate Age</button>
<p id="result"></p>
</div>

<script>

function age(){

let dob=new Date(document.getElementById("dob").value);

let today=new Date();

let age=today.getFullYear()-dob.getFullYear();

document.getElementById("result").innerHTML="Your Age: "+age;

}

</script>

</body>
</html>
